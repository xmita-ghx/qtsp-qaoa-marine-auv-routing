name: Deploy Notebook to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install jupyter nbconvert plotly docplex qiskit qiskit-algorithms qiskit-optimization matplotlib

    - name: Execute and Compile Notebook to Index HTML
      run: |
        # 1. Compile the notebook normally including all code inputs
        jupyter nbconvert --execute --to html benchmarks/AUV_Routing_Simulation.ipynb --stdout > index.html
        
        # 2. Inject a custom toggle button and styling directly into the compiled HTML file
        sed -i '/<\/head>/i \
        <style>\
          .jp-InputArea, .input { display: none; margin-bottom: 15px; }\
          #toggle-code-btn {\
            position: fixed; top: 20px; right: 20px; z-index: 9999;\
            background-color: #007bff; color: white; border: none;\
            padding: 10px 18px; font-weight: bold; font-family: sans-serif;\
            border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);\
            transition: background 0.2s;\
          }\
          #toggle-code-btn:hover { background-color: #0056b3; }\
        </style>\
        <script>\
          function toggleCode() {\
            var inputs = document.querySelectorAll(".jp-InputArea, .input");\
            var btn = document.getElementById("toggle-code-btn");\
            var isHidden = inputs[0].style.display === "none" || inputs[0].style.display === "";\
            inputs.forEach(el => el.style.display = isHidden ? "block" : "none");\
            btn.innerText = isHidden ? "HIDE CODE" : "SHOW CODE";\
          }\
          document.addEventListener("DOMContentLoaded", function() {\
            var btn = document.createElement("button");\
            btn.id = "toggle-code-btn";\
            btn.innerText = "SHOW CODE";\
            btn.onclick = toggleCode;\
            document.body.appendChild(btn);\
          });\
        </script>' index.html

    - name: Commit and Push Webpage
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Automated build: Render interactive graph arrays with code toggle" || exit 0
        git push